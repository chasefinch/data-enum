[environment]
python = ".venv"

[rules]
all = "error"

[[overrides]]
include = ["data_enum/*"]
[overrides.rules]
# DataEnum uses a metaclass that dynamically sets attributes on subclasses
unresolved-attribute = "ignore"
unsupported-operator = "ignore"
invalid-argument-type = "ignore"

[[overrides]]
include = ["tests/*"]
[overrides.rules]
# DataEnum uses dynamic attribute setting (Currency.USD = Currency(...))
unresolved-attribute = "ignore"
# Tests intentionally pass wrong args to verify errors
too-many-positional-arguments = "ignore"
missing-argument = "ignore"
unknown-argument = "ignore"

[terminal]
output-format = "full"
